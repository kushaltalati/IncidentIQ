spec_version: 1
name: incidentiq_env
type: space
runtime: fastapi
app: incidentiq_env.server.app:app
port: 8000
description: "IncidentIQ — Autonomous SRE Incident Response. Triage alerts, diagnose root causes, execute remediation runbooks, and resolve production incidents."
tags:
  - openenv
  - sre
  - incident-response
  - ops
  - reliability
tasks:
  - name: alert_triage
    difficulty: easy
    description: "Classify root cause and severity from an alert"
  - name: runbook_execution
    difficulty: medium
    description: "Execute correct remediation runbook given a known root cause"
  - name: full_incident_response
    difficulty: hard
    description: "End-to-end incident response: investigate, diagnose, remediate, verify, post-mortem"
